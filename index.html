<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Lucky Website</title>
	<link rel="stylesheet" type="text/css" href="style.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
<script src="jquery-3.5.1.min.js"></script>

</head>
<body>
<section>
	<h1>What Does Your Name Says About Your Personality?</h1>
	<div class="centerDiv">
		<div class="details">
			<label>ENTER YOUR NAME:</label><br>
			<input type="text" name="text" id="nameid">
		</div>
		<div class="imgdiv">
			<img src="img/wlc.png" width="200" height="200" id="imgcng">
		</div>
		<button>Click Me!</button>
	</div>
</section>	

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

<script>
 $(document).ready(function(){
  $('button').click(function(){
   const name = $('#nameid').val();
   alert(name);
   $('.imgcng').attr('src',`https://joeschmoe.io/api/v1/${name}`);
   const b = $('.imgcng');
   console.log(b);

  });
 });
</script>


</body>
</html>
